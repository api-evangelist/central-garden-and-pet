specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Central Garden and Pet
providerId: central-garden-and-pet
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Pet Products
  - Garden
  - Consumer
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps scaffold for Central Garden & Pet. No public API pricing exists; meters
  capture integration telemetry against retailer / distributor contracts that are the actual cost surface.'
notes: Cost surface is contract-driven; no per-call invoicing.
sources:
  - https://www.central.com
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Central Garden & Pet Company
serviceCategory: Consumer Goods (Pet + Garden)
billingModel:
  pricingCategory: Custom (Partner Contract)
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Central Garden and Pet API
  ServiceCategory: Consumer Goods Distribution
  ProviderName: Central Garden and Pet
  PublisherName: Central Garden & Pet Company
  InvoiceIssuerName: Central Garden & Pet Company
  BillingCurrency: USD
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - partner
  - name: orders_synchronized
    unit: order
    aggregation: count
    dimensions:
      - retailer
  - name: edi_documents_exchanged
    unit: document
    aggregation: count
    dimensions:
      - document_type
      - partner
principles:
  - name: Visibility
    description: Track partner integration via the negotiated reporting surface delivered with the retailer
      / distributor contract; no public usage API.
  - name: Allocation
    description: Tag integration costs to the retailer / distributor relationship and the originating
      product line (pet vs. garden).
  - name: Optimization
    description: Batch order / inventory / shipment EDI documents on the agreed cadence; consolidate
      redundant SKU master data calls.
  - name: Accountability
    description: A retail-channel owner reconciles partner fees against contracts; IT owns EDI / API
      integration uptime.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
